<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2D6A4F"/>
      <stop offset="100%" stop-color="#1A4732"/>
    </linearGradient>
    <linearGradient id="goldg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E5C977"/>
      <stop offset="100%" stop-color="#B6953D"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#g)"/>
  <g transform="translate(256,256)">
    <!-- étoile 8 branches dorée -->
    <path d="M0,-150 L43,-43 L150,0 L43,43 L0,150 L-43,43 L-150,0 L-43,-43 Z"
          fill="url(#goldg)" stroke="#C9A84C" stroke-width="3"/>
    <!-- carré tourné -->
    <path d="M-105,-105 L105,-105 L105,105 L-105,105 Z"
          fill="none" stroke="#FAF7F0" stroke-width="3" transform="rotate(45)" opacity="0.7"/>
    <!-- coeur : flèche/ticket -->
    <path d="M-22,-40 L22,0 L-22,40 Z" fill="#2D6A4F"/>
    <circle r="6" fill="#FAF7F0"/>
  </g>
</svg>
